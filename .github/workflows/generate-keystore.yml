name: 1 - Generar llave de firma (una sola vez)

# ADVERTENCIA DE SEGURIDAD
# Este flujo crea la llave con la que se firma tu app para siempre.
# Si tu repositorio es PÚBLICO, cualquiera puede ver los registros y
# descargar los archivos adjuntos ("artifacts") de tus ejecuciones de
# Actions. Antes de correr este flujo:
#   Settings → General → Danger Zone → Change visibility → Private
# Puedes volverlo público otra vez después de bajar la llave y borrar
# esta ejecución del historial de Actions (pestaña Actions → esta
# ejecución → ⋯ → Delete workflow run).
#
# Corre esto UNA SOLA VEZ. Después, borra este archivo del repositorio
# (o al menos no lo vuelvas a ejecutar) para no arriesgar la llave.

on:
  workflow_dispatch:

jobs:
  generar:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar JDK (trae keytool)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Crear la llave de firma
        run: |
          KEYSTORE_PASS=$(openssl rand -base64 18)
          KEY_PASS=$(openssl rand -base64 18)
          keytool -genkeypair -v \
            -keystore android.keystore \
            -alias destilador \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$KEYSTORE_PASS" \
            -keypass "$KEY_PASS" \
            -dname "CN=Destilador, OU=Destilador, O=Destilador, L=CDMX, S=CDMX, C=MX"
          base64 -w0 android.keystore > android.keystore.b64
          {
            echo "### Guarda estos 3 valores como secretos del repositorio"
            echo "(Settings → Secrets and variables → Actions → New repository secret)"
            echo ""
            echo "**ANDROID_KEYSTORE_PASSWORD**"
            echo '```'
            echo "$KEYSTORE_PASS"
            echo '```'
            echo "**ANDROID_KEY_PASSWORD**"
            echo '```'
            echo "$KEY_PASS"
            echo '```'
            echo "**ANDROID_KEYSTORE_BASE64**: descarga el archivo adjunto"
            echo "\`android.keystore.b64\` de esta misma ejecución (más abajo,"
            echo "sección Artifacts) y copia TODO su contenido como el valor"
            echo "del secreto — es una sola línea larga de texto."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Adjuntar la llave (descárgala y luego borra esta ejecución)
        uses: actions/upload-artifact@v4
        with:
          name: llave-firma-destilador
          path: |
            android.keystore
            android.keystore.b64
          retention-days: 1
