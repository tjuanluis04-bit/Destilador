name: 2 - Compilar APK

# Requiere que ya hayas corrido el workflow "1 - Generar llave de firma"
# y guardado sus 3 valores como secretos del repositorio:
#   ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_PASSWORD
#
# También edita MANIFEST_URL más abajo si tu sitio no está en la raíz de
# tu dominio de GitHub Pages (por ejemplo si es un project page con una
# carpeta extra en la URL).

on:
  workflow_dispatch:

env:
  MANIFEST_URL: https://nluis04-bit.github.io/manifest.json
  PACKAGE_ID: io.github.nluis04bit.destilador

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Instalar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Instalar Android SDK (acepta licencias automáticamente)
        uses: android-actions/setup-android@v3

      - name: Instalar Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Escribir la configuración de Bubblewrap directamente
        # bubblewrap updateConfig tiene un bug conocido: a veces pregunta
        # igual aunque le pases las rutas por parámetro. Escribir el
        # archivo de configuración a mano evita ese problema por completo.
        run: |
          mkdir -p "$HOME/.bubblewrap"
          printf '{"jdkPath":"%s","androidSdkPath":"%s"}' "$JAVA_HOME" "$ANDROID_HOME" > "$HOME/.bubblewrap/config.json"
          cat "$HOME/.bubblewrap/config.json"

      - name: Verificar que las rutas quedaron bien (solo diagnóstico)
        run: bubblewrap doctor

      - name: Restaurar la llave de firma desde los secretos
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android.keystore

      - name: Generar el proyecto Android a partir del manifest en línea
        run: bubblewrap init --manifest="${{ env.MANIFEST_URL }}" --directory=.

      - name: Fijar el packageId y la llave de firma correctos
        run: |
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('twa-manifest.json', 'utf8'));
            m.packageId = process.env.PACKAGE_ID;
            m.signingKey = { path: './android.keystore', alias: 'destilador' };
            fs.writeFileSync('twa-manifest.json', JSON.stringify(m, null, 2));
          "

      - name: Compilar y firmar la APK
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: bubblewrap build

      - name: Subir la APK compilada
        uses: actions/upload-artifact@v4
        with:
          name: destilador-apk
          path: app-release-signed.apk
